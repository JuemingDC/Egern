name: "WeTalk 自动化签到+视频奖励"
description: "WeTalk 抓取账号参数后，定时执行签到与视频奖励任务。支持多账号查看、指定运行和删除账号。"
author: "TG@ZenMoFiShi, converted for Egern"

env_schema:
  RUN_ACCOUNTS:
    name: "运行账号"
    description: "留空运行全部。可填编号、邮箱、账号ID或别名，多个用逗号、分号或换行分隔。"
    default_value: ""

  DELETE_ACCOUNTS:
    name: "删除账号"
    description: "填写要删除的账号编号、邮箱、账号ID或别名。推荐填编号，例如 2。多个用逗号、分号或换行分隔。"
    default_value: ""

  DELETE_ALL:
    name: "清空全部账号"
    description: "设为 true 后，手动运行账号管理脚本会清空全部账号。"
    default_value: "false"
    options:
      - "false"
      - "true"

scriptings:
  - http_request:
      name: "WeTalk 参数抓取"
      match: '^https://api\.wetalkapp\.com/app/queryBalanceAndBonus'
      script_url: "https://github.com/JuemingDC/Egern/raw/main/JavaScript/Wetalk/Wetalk_capture.js"
      timeout: 10
      update_interval: 0
      env:
        SHOW_SENSITIVE: "false"

  - schedule:
      name: "WeTalk 签到任务"
      cron: "5 */6 * * *"
      script_url: "https://github.com/JuemingDC/Egern/raw/main/JavaScript/Wetalk/Wetalk_task.js"
      timeout: 120
      update_interval: 0
      env:
        RUN_ACCOUNTS: ""

  - generic:
      name: "WeTalk 账号管理"
      script_url: "https://github.com/JuemingDC/Egern/raw/main/JavaScript/Wetalk/Wetalk_account_manger.js"
      timeout: 30
      update_interval: 0
      

mitm:
  hostnames:
    - "api.wetalkapp.com"
